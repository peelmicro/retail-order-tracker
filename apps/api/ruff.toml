line-length = 100
target-version = "py313"

[lint]
# E — pycodestyle errors
# F — pyflakes (undefined names, unused imports)
# I — isort (import ordering)
# UP — pyupgrade (modern Python idioms)
# B — flake8-bugbear (common pitfalls)
select = ["E", "F", "I", "UP", "B"]
ignore = []

[lint.flake8-bugbear]
# FastAPI's dependency-injection markers are safe to use as argument defaults,
# even though they look like function calls. Without this, B008 flags every
# `Depends(...)`, `Query(...)`, etc.
extend-immutable-calls = [
    "fastapi.Body",
    "fastapi.Cookie",
    "fastapi.Depends",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.Header",
    "fastapi.Path",
    "fastapi.Query",
    "fastapi.Security",
]

[lint.per-file-ignores]
# Test files: allow unused imports (fixtures), long lines
"tests/*" = ["F401", "E501"]
# Alembic migrations: generated code, relax style
"alembic/versions/*" = ["E501"]
