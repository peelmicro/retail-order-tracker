services:
  postgres:
    image: postgres:16
    container_name: rot-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_orders}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail} -d ${POSTGRES_DB:-retail_orders}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: rot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-orders} &&
      mc anonymous set download local/${MINIO_BUCKET:-orders} &&
      echo 'MinIO bucket ${MINIO_BUCKET:-orders} ready'
      "

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: rot-phoenix
    restart: unless-stopped
    ports:
      - "${PHOENIX_UI_PORT:-6006}:6006"
      - "${PHOENIX_GRPC_PORT:-4317}:4317"
      - "${PHOENIX_HTTP_PORT:-4318}:4318"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix_data:/data

  n8n:
    # Pinned to 1.x — n8n 2.x removed N8N_USER_MANAGEMENT_DISABLED, which the
    # demo relies on to avoid forcing operators through an "owner setup" dance.
    image: n8nio/n8n:1.121.0
    container_name: rot-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-retail}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
      # n8n 1.x removed basic auth in favour of internal user management.
      # For a localhost demo we disable user management entirely so the
      # editor is open access — never do this in production.
      N8N_USER_MANAGEMENT_DISABLED: "true"
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      WEBHOOK_URL: http://localhost:${N8N_PORT:-5678}/
      # Full-stack: API service is reachable via Docker DNS at api:8000.
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  n8n-init:
    # Pinned to 1.x — n8n 2.x removed N8N_USER_MANAGEMENT_DISABLED, which the
    # demo relies on to avoid forcing operators through an "owner setup" dance.
    image: n8nio/n8n:1.121.0
    container_name: rot-n8n-init
    restart: "no"
    depends_on:
      n8n:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-retail}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./scripts/import-n8n-workflows.sh:/import-workflows.sh:ro
    entrypoint: ["/bin/sh", "/import-workflows.sh"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-mirror.gcr.io/library}
    container_name: rot-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      # DB
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-retail_orders}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
      # Storage
      MINIO_ENDPOINT: minio:9000
      # Hostname baked into presigned URLs returned to the browser. Must be
      # resolvable from the user's machine — `minio:9000` only works inside
      # the Docker network, so we expose the host's mapped port instead.
      MINIO_PUBLIC_ENDPOINT: localhost:${MINIO_API_PORT:-9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-orders}
      MINIO_SECURE: "false"
      # Observability
      PHOENIX_ENDPOINT: http://phoenix:6006
      # AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-use-32-byte-secret}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      # CORS — must include the WEB host port the browser hits
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      # General
      TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      # Sample files location inside the image (see apps/api/Dockerfile)
      SAMPLES_DIR: /app/samples/orders
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      phoenix:
        condition: service_started

  web:
    build:
      context: ./apps/web
      args:
        BASE_REGISTRY: ${BASE_REGISTRY:-mirror.gcr.io/library}
        # Browser hits the API via the host port, not the Docker network.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: rot-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  phoenix_data:
  n8n_data:
