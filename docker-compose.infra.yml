services:
  postgres:
    image: postgres:16
    container_name: rot-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retail_orders}
      POSTGRES_USER: ${POSTGRES_USER:-retail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-retail} -d ${POSTGRES_DB:-retail_orders}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: rot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: rot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-orders} &&
      mc anonymous set download local/${MINIO_BUCKET:-orders} &&
      echo 'MinIO bucket ${MINIO_BUCKET:-orders} ready'
      "

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: rot-phoenix
    restart: unless-stopped
    ports:
      - "${PHOENIX_UI_PORT:-6006}:6006"
      - "${PHOENIX_GRPC_PORT:-4317}:4317"
      - "${PHOENIX_HTTP_PORT:-4318}:4318"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix_data:/data

  n8n:
    image: n8nio/n8n:latest
    container_name: rot-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    extra_hosts:
      # Allows workflows (and the CLI) to reach the API when it runs on the
      # host machine during infra-only dev. The full-stack compose will
      # override API_BASE_URL to point at the api service directly.
      - "host.docker.internal:host-gateway"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-retail}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-admin}
      GENERIC_TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      WEBHOOK_URL: http://localhost:${N8N_PORT:-5678}/
      # Workflows reference {{ $env.API_BASE_URL }} so they stay portable
      # between infra-only (host) and full-stack (api service) modes.
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000}
      # n8n 1.x blocks $env access in expressions by default. We explicitly
      # allow it so workflows can read API_BASE_URL — otherwise the HTTP
      # Request nodes fail with "access to env vars denied".
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  n8n-init:
    image: n8nio/n8n:latest
    container_name: rot-n8n-init
    restart: "no"
    depends_on:
      n8n:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-retail}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-retail_secret}
    volumes:
      # Share n8n_data so the init container reads the SAME encryption key
      # that the main n8n instance generated — otherwise imported workflows
      # encrypt their credentials with a different key than n8n uses at runtime.
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
      - ./scripts/import-n8n-workflows.sh:/import-workflows.sh:ro
    entrypoint: ["/bin/sh", "/import-workflows.sh"]

volumes:
  postgres_data:
  minio_data:
  phoenix_data:
  n8n_data:
